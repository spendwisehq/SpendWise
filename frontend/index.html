<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>SpendWise — AI Finance</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <!--
      CRITICAL: Apply theme before React loads to prevent flash.
      This runs synchronously before any JS or CSS.
    -->
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('sw_theme') || 'dark';
          document.documentElement.setAttribute('data-theme', theme);
        } catch(e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
    <style>
      /* Prevent white flash before CSS loads */
      html                        { background: #030712; color: #F1F5F9; }
      html[data-theme="light"]    { background: #F8FAFC; color: #0F172A; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
